name: Analisador Diário de Músicas

on:
  schedule:
    # Roda todos os dias às 09:00 UTC (06:00 no Horário de Brasília)
    - cron: '0 9 * * *'
  workflow_dispatch: # Permite rodar manualmente

jobs:
  analisar_dados:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Baixa o histórico completo para evitar problemas de sincronização

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install requests beautifulsoup4

      - name: Rodar script de análise
        run: python analisador.py

      - name: Salvar alterações no GitHub (Git Nativo)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Adiciona os arquivos modificados/criados
          git add dados_anteriores.json relatorio_diario.md
          
          # Só faz o commit se houver alguma mudança real
          git diff --staged --quiet || git commit -m "📊 Relatório diário gerado automaticamente"
          
          # Faz um pull forçando o rebase para engolir qualquer divergência do servidor
          git pull origin main --rebase
          
          # Envia as alterações em definitivo
          git push origin main
